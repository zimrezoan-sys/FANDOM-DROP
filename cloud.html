<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fandom Drop Logo</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --accent-anime: #ff3366; /* গোলাপি শেড */
      --accent-dc: #0476f2;    /* নীল/বেগুনি শেড */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-family: 'Black Ops One', cursive; 
      font-size: clamp(35px, 8vw, 75px); /* স্ক্রিনের সাইজ অনুযায়ী ফন্ট ছোট-বড় হবে */
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--accent-anime), var(--accent-dc));
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent;
      text-align: center;
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="logo">FANDOM DROP</div>

</body>
</html>
